<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Iris radial gradient -->
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4A5DFF" stop-opacity="0.25"/>
    </radialGradient>

    <!-- Outer glow for eye strokes -->
    <filter id="glowEye" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow for iris -->
    <filter id="glowIris" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to eye shape -->
    <clipPath id="eyeClip">
      <path d="M 28,100 C 70,48 130,48 172,100 C 130,152 70,152 28,100 Z"/>
    </clipPath>
  </defs>



  <!-- Eye interior fill (dark surface) -->
  <path d="M 28,100 C 70,48 130,48 172,100 C 130,152 70,152 28,100 Z"
        fill="#1A1D23"/>

  <!-- Iris glow circle -->
  <circle cx="100" cy="100" r="32"
          fill="url(#irisGrad)"
          filter="url(#glowIris)"/>

  <!-- GitHub Octocat mark — centered at (100,100), 20×20 px -->
  <g transform="translate(91.5, 91.5) scale(0.708)">
    <path fill="#FFFFFF"
      d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205
         11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04
         -3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7
         3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838
         1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998
         .108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466
         -5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105
         -3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405
         1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23
         .645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22
         0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22
         0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57
         C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
  </g>

  <!-- Eye upper stroke -->
  <path d="M 28,100 C 70,48 130,48 172,100"
        fill="none"
        stroke="#4A5DFF"
        stroke-width="3.5"
        stroke-linecap="round"
        filter="url(#glowEye)"/>

  <!-- Eye lower stroke -->
  <path d="M 28,100 C 70,152 130,152 172,100"
        fill="none"
        stroke="#4A5DFF"
        stroke-width="3.5"
        stroke-linecap="round"
        filter="url(#glowEye)"/>

  <!-- Corner highlight dots (left & right eye tips) -->
  <circle cx="28"  cy="100" r="3.5" fill="#4A5DFF" opacity="0.7"/>
  <circle cx="172" cy="100" r="3.5" fill="#4A5DFF" opacity="0.7"/>
</svg>
