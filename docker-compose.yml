version: '3.8'

services:
  backend:
    build:
      context: ./services/backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGO_URL=mongodb://mongo:27017/DevLens
      - JWT_SECRET=dev_secret
      # Add other env vars as needed
    depends_on:
      - mongo
    volumes:
      - ./services/backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
    depends_on:
      - backend

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
